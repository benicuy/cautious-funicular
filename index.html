<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QUANTUM_Ω OVERLAY FF 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: transparent !important;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto; /* biar bisa di klik */
        }
        /* LAYAR OVERLAY FULL TRANSPARAN */
        .overlay-crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: red;
            border-radius: 50%;
            box-shadow: 0 0 0 2px black, 0 0 0 4px red;
            z-index: 2147483647;
            pointer-events: none;
        }
        .control-panel {
            position: fixed;
            bottom: 20px;
            left: 10px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border: 1px solid cyan;
            border-radius: 28px;
            padding: 12px;
            width: 260px;
            z-index: 2147483647;
            cursor: move;
            color: #0ff;
            font-family: monospace;
            font-size: 12px;
            box-shadow: 0 0 15px cyan;
            pointer-events: auto;
        }
        button {
            background: linear-gradient(45deg, #0a0, #0f0);
            border: none;
            padding: 8px;
            margin: 6px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            width: calc(50% - 12px);
        }
        .aim-btn {
            background: #ff3366;
            color: white;
            box-shadow: 0 0 8px red;
        }
        .mode {
            margin-top: 6px;
            font-size: 10px;
            text-align: center;
        }
        .drag-area {
            background: #0ff22a22;
            padding: 6px;
            text-align: center;
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: grab;
        }
        .drag-area:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <!-- AIMBOT VISUAL CROSSHAIR -->
    <div class="overlay-crosshair"></div>
    
    <!-- DRAGABLE CONTROL PANEL -->
    <div class="control-panel" id="dragPanel">
        <div class="drag-area" id="dragHandle">🔥 QUANTUM_Ω FF OVERLAY 🔥 (SERET)</div>
        <button id="aimbotBtn">🎯 AKTIFKAN AIMBOT VISUAL</button>
        <button id="espBtn">👁️ ESP WALLHACK SIMULASI</button>
        <button id="resetBtn">⟳ RESET SEMUA</button>
        <div class="mode" id="infoText">⚡ MODE: SIAP OVERLAY ⚡</div>
        <div style="font-size: 9px; margin-top: 6px;">🌌 OVERLAY INI SELALU DIATAS APAPUN!</div>
    </div>

    <script>
        // ============ DRAG PANEL ============
        const panel = document.getElementById('dragPanel');
        const dragHandle = document.getElementById('dragHandle');
        let isDragging = false;
        let offsetX, offsetY;
        
        function dragStart(e) {
            isDragging = true;
            const rect = panel.getBoundingClientRect();
            const clientX = e.clientX ?? e.touches[0].clientX;
            const clientY = e.clientY ?? e.touches[0].clientY;
            offsetX = clientX - rect.left;
            offsetY = clientY - rect.top;
            e.preventDefault();
        }
        
        function dragMove(e) {
            if (!isDragging) return;
            const clientX = e.clientX ?? e.touches[0].clientX;
            const clientY = e.clientY ?? e.touches[0].clientY;
            panel.style.left = (clientX - offsetX) + 'px';
            panel.style.top = (clientY - offsetY) + 'px';
            panel.style.bottom = 'auto';
            panel.style.right = 'auto';
        }
        
        function dragEnd() {
            isDragging = false;
        }
        
        dragHandle.addEventListener('mousedown', dragStart);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', dragEnd);
        dragHandle.addEventListener('touchstart', dragStart);
        window.addEventListener('touchmove', dragMove);
        window.addEventListener('touchend', dragEnd);
        
        // ============ OVERLAY FUNCTIONS ============
        const info = document.getElementById('infoText');
        let aimbotActive = false;
        let espActive = false;
        
        // SIMULASI AIMBOT OVERLAY (lingkaran penanda)
        let aimRing = null;
        function createAimRing() {
            if (aimRing) aimRing.remove();
            aimRing = document.createElement('div');
            aimRing.style.position = 'fixed';
            aimRing.style.width = '40px';
            aimRing.style.height = '40px';
            aimRing.style.border = '3px solid #ff3366';
            aimRing.style.borderRadius = '50%';
            aimRing.style.boxShadow = '0 0 15px red';
            aimRing.style.pointerEvents = 'none';
            aimRing.style.zIndex = '2147483646';
            aimRing.style.top = '50%';
            aimRing.style.left = '50%';
            aimRing.style.transform = 'translate(-50%, -50%)';
            document.body.appendChild(aimRing);
        }
        
        document.getElementById('aimbotBtn').addEventListener('click', () => {
            if (!aimbotActive) {
                createAimRing();
                aimbotActive = true;
                info.innerHTML = '🔥 AIMBOT VISUAL ON 🔥 (auto lock ke center)';
                info.style.color = '#f0f';
            } else {
                aimRing?.remove();
                aimbotActive = false;
                info.innerHTML = '⚡ AIMBOT VISUAL OFF ⚡';
                info.style.color = '#0ff';
            }
        });
        
        document.getElementById('espBtn').addEventListener('click', () => {
            if (!espActive) {
                                // SIMULASI ESP KOTAK-KOTAK DI LAYAR
                for (let i = 0; i < 5; i++) {
                    const box = document.createElement('div');
                    box.className = 'esp-box';
                    box.style.position = 'fixed';
                    box.style.width = '50px';
                    box.style.height = '90px';
                    box.style.border = '2px solid #0f0';
                    box.style.backgroundColor = '#0f0088aa';
                    box.style.bottom = (10 + (i * 70)) + 'px';
                    box.style.right = (10 + (i * 60)) + 'px';
                    box.style.zIndex = '2147483645';
                    box.style.pointerEvents = 'none';
                    box.style.fontSize = '8px';
                    box.style.color = 'lime';
                    box.style.padding = '4px';
                    box.innerHTML = '🎯 ENEMY ' + (i+1);
                    document.body.appendChild(box);
                    setTimeout(() => box.remove(), 4000);
                }
                info.innerHTML = '👁️ ESP AKTIF (4 DETIK SIMULASI) 👁️';
                espActive = true;
                setTimeout(() => { espActive = false; info.innerHTML = '⚡ ESP HABIS, TEKAN LAGI ⚡'; }, 4000);
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            aimRing?.remove();
            aimbotActive = false;
            info.innerHTML = '✅ SEMUA RESET ✅ OVERLAY TETAP AKTIF';
            info.style.color = '#0f0';
            // hapus semua esp sisa
            document.querySelectorAll('.esp-box').forEach(el => el.remove());
        });
        
        // BIAR OVERLAY KELIHATAN DI ATAS FF 
        console.log('🔥 QUANTUM_Ω OVERLAY SIAP TEMBUS SEMUA APLIKASI 🔥');
        // efek pulsasi crosshair
        const cross = document.querySelector('.overlay-crosshair');
        setInterval(() => {
            if (aimbotActive) {
                cross.style.transform = 'translate(-50%, -50%) scale(1.2)';
                cross.style.backgroundColor = 'lime';
                setTimeout(() => {
                    cross.style.transform = 'translate(-50%, -50%) scale(1)';
                    cross.style.backgroundColor = 'red';
                }, 150);
            }
        }, 600);
    </script>
</body>
</html>
